[build]
  publish = "."

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/content"
  to = "/.netlify/functions/content"
  status = 200

[[redirects]]
  from = "/api/login"
  to = "/.netlify/functions/login"
  status = 200

[[redirects]]
  from = "/api/save"
  to = "/.netlify/functions/save"
  status = 200

[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload"
  status = 200

[[redirects]]
  from = "/api/change-password"
  to = "/.netlify/functions/change-password"
  status = 200

[[redirects]]
  from = "/api/image/*"
  to = "/.netlify/functions/get-image?key=:splat"
  status = 200

# Interne Dateien nicht öffentlich ausliefern (Pendant zu BLOCKED_PATHS in server.py)
[[redirects]]
  from = "/admin_config.json"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/server.py"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/netlify/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/netlify.toml"
  to = "/"
  status = 404
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'; object-src 'none'"
