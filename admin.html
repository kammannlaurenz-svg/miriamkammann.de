<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin – Inhalte bearbeiten | Miriam Kammann</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="assets/style.css">
<style>
  body { background: var(--creme); }
  .admin-wrap { max-width: 880px; margin: 0 auto; padding: 40px 20px 100px; }
  .admin-kopf { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
  .admin-kopf h1 { font-size: 1.6rem; }
  .admin-kopf a { color: var(--beere-dunkel); font-weight: 600; text-decoration: none; }
  .admin-kopf a:hover { text-decoration: underline; }

  .login-karte {
    max-width: 380px;
    margin: 90px auto;
    background: var(--weiss);
    border-radius: var(--radius-l);
    box-shadow: var(--schatten-m);
    padding: 36px;
    text-align: center;
  }
  .login-karte h1 { font-size: 1.3rem; margin-bottom: 8px; }
  .login-karte p { color: var(--grau); font-size: 0.92rem; margin-bottom: 22px; }

  input[type="text"], input[type="password"], textarea {
    width: 100%;
    font-family: var(--font-sans);
    font-size: 0.96rem;
    padding: 11px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--linie);
    background: var(--weiss);
    color: var(--pflaume);
  }
  input:focus, textarea:focus { outline: none; border-color: var(--beere-hell); }
  textarea { resize: vertical; min-height: 84px; line-height: 1.45; }

  .feld { margin-bottom: 16px; }
  .feld label { display: block; font-size: 0.86rem; font-weight: 600; color: var(--beere-dunkel); margin-bottom: 5px; }
  .feld .hinweis { font-size: 0.78rem; color: var(--grau); margin-top: 4px; }

  details.gruppe {
    background: var(--weiss);
    border: 1px solid var(--linie);
    border-radius: var(--radius-m);
    margin-bottom: 16px;
    box-shadow: var(--schatten-s);
    overflow: hidden;
  }
  details.gruppe > summary {
    cursor: pointer;
    padding: 18px 22px;
    font-weight: 700;
    color: var(--pflaume);
    list-style: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  details.gruppe > summary::-webkit-details-marker { display: none; }
  details.gruppe > summary::after { content: "+"; color: var(--beere); font-size: 1.3rem; }
  details.gruppe[open] > summary::after { content: "–"; }
  .gruppe-inhalt { padding: 4px 22px 22px; }

  .bild-karte { display: grid; grid-template-columns: 160px 1fr; gap: 18px; align-items: start; margin-bottom: 8px; }
  .bild-karte img { width: 160px; height: 120px; object-fit: cover; border-radius: 10px; border: 1px solid var(--linie); background: var(--rose); }
  .bild-karte .bild-titel { font-weight: 700; margin-bottom: 4px; }
  .bild-karte .hinweis { font-size: 0.82rem; color: var(--grau); margin-bottom: 10px; }

  .leiste {
    position: sticky;
    top: 0;
    z-index: 5;
    background: var(--creme);
    padding: 14px 0;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--linie);
    margin-bottom: 24px;
  }
  .status { font-size: 0.9rem; font-weight: 600; }
  .status.ok { color: #1b7a3f; }
  .status.fehler { color: var(--beere); }

  .passwort-box {
    background: var(--weiss);
    border: 1px solid var(--linie);
    border-radius: var(--radius-m);
    padding: 22px;
    margin-top: 32px;
  }
  .passwort-box h2 { font-size: 1.05rem; margin-bottom: 12px; }
  .passwort-zeile { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .passwort-zeile .feld { flex: 1; min-width: 180px; margin-bottom: 0; }

  @media (max-width: 560px) {
    .bild-karte { grid-template-columns: 1fr; }
    .bild-karte img { width: 100%; height: 160px; }
  }
</style>
</head>
<body>

<div id="login" class="login-karte">
  <h1>Inhalte bearbeiten</h1>
  <p>Bitte Passwort eingeben, um Texte und Fotos der Webseite zu ändern.</p>
  <div class="feld">
    <input type="password" id="loginPasswort" placeholder="Passwort" autofocus>
  </div>
  <button class="btn btn-primaer" id="loginButton" style="width:100%; justify-content:center;">Anmelden</button>
  <p class="status fehler" id="loginFehler" style="margin-top:14px;"></p>
</div>

<div class="admin-wrap" id="editor" hidden>
  <div class="admin-kopf">
    <h1>Inhalte bearbeiten</h1>
    <a href="index.html" target="_blank" rel="noopener">Webseite ansehen ↗</a>
  </div>

  <div class="leiste">
    <button class="btn btn-primaer" id="speichernButton">Alle Texte speichern</button>
    <span class="status" id="speichernStatus"></span>
  </div>

  <details class="gruppe" open>
    <summary>Fotos</summary>
    <div class="gruppe-inhalt" id="bilderListe"></div>
  </details>

  <div id="textGruppen"></div>

  <div class="passwort-box">
    <h2>Passwort ändern</h2>
    <div class="passwort-zeile">
      <div class="feld">
        <label>Aktuelles Passwort</label>
        <input type="password" id="altesPasswort">
      </div>
      <div class="feld">
        <label>Neues Passwort (mind. 6 Zeichen)</label>
        <input type="password" id="neuesPasswort">
      </div>
      <button class="btn btn-hell" id="passwortAendernButton">Ändern</button>
    </div>
    <p class="status" id="passwortStatus" style="margin-top:10px;"></p>
  </div>
</div>

<script src="assets/admin.js"></script>
</body>
</html>
